apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapseos-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synapseos-backend
  template:
    metadata:
      labels:
        app: synapseos-backend
    spec:
      containers:
        - name: backend
          image: synapseos-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://user:pass@postgres:5432/synapseos"