name: SynapseOS Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: |
        docker build \
        -t synapseos-backend \
        ./backend

    - name: Build Frontend Docker Image
      run: |
        docker build \
        -t synapseos-frontend \
        ./frontend

    - name: Deployment Complete
      run: echo "SynapseOS deployment pipeline executed successfully"
