version: "3.9"

services:

  postgres:

    image: postgres:15

    container_name: synapseos-postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: synapseos

    ports:
      - "5432:5432"

  redis:

    image: redis:latest

    container_name: synapseos-redis

    ports:
      - "6379:6379"

  backend:

    build: ./backend

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/synapseos

    depends_on:
      - postgres
      - redis

  frontend:

    build: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend